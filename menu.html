<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Bienvenido a Alke Wallet</span>
    <button onclick="logout()" class="btn btn-outline-light btn-sm">Cerrar Sesión</button>
</nav>
<div class="container mt-5 fade-in">
    <div class="card wallet-card p-4 text-center">
        <h2>Bienvenido a Alke Wallet</h2>
        <div class="balance-amount">Saldo actual: $<span id="balance"></span></div>
    </div>


    <div class="row mt-4">
        <div class="col-md-4">
            <button onclick="goTo('deposit.html')" class="btn btn-success w-100 btn-custom">Depositar</button>
        </div>
        <div class="col-md-4">
            <button onclick="goTo('sendmoney.html')" class="btn btn-warning w-100 btn-custom">Enviar Dinero</button>
        </div>
        <div class="col-md-4">
            <button onclick="goTo('transactions.html')" class="btn btn-primary w-100 btn-custom">Ver Transacciones</button>
        </div>
    </div>
</div>


<script src="assets/js/wallet.js"></script>
<script src="assets/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
