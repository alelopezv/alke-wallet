<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center center-box">
<div>
    <h2 class="card p-4 wallet-card" style="width: 350px">Iniciar Sesión</h2>
    <form id="loginForm">
        <div class="mb-3">
            <input type="text" id="username" class="form-control" placeholder="Usuario" required>
        </div>
        <div>
            <input type="password" id="password" class="form-control" placeholder="Contraseña" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-100 btn-custom">Ingresar</button>
    </form>

    <p id="error" class="text-danger text-center mt-2"></p>
</div>


<script src="assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
