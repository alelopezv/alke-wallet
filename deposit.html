<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar - Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Depositar Dinero</span>
</nav>
<div class="container mt-5">
    <div class="card p-4 wallet-card">
        <input type="number" id="amount" class="form-control mb-3" placeholder="Monto" required>
        <div id="message" class="text-success mb-2"></div>
        <button class="btn btn-success w-100 mb-2" onclick="deposit()">Depositar</button>
        <button onclick="goTo('menu.html')" class="btn btn-secondary w-100">Volver</button>
    </div>
</div>
<script src="assets/js/wallet.js"></script>
<script src="assets/js/main.js"></script>
