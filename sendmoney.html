<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero - Alke Wallet</title>
    <link href="assets/css/styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Enviar Dinero</span>
</nav>
<div class="container mt-5">
    <div class="card p-4 wallet-card">
        <input list="contacts" id="contact" class="form-control mb-3" placeholder="Buscar contacto">
        <datalist id="contacts"></datalist>
        <input type="text" id="newContact" class="form-control mb-2" placeholder="Nuevo contacto">
        <button onclick="addContact()" class="btn btn-primary w-100 mb-3">Agregar contacto</button>
        <input type="number" id="amount" class="form-control mb-3" placeholder="Monto a enviar" required>
        <button onclick="sendMoney()" class="btn btn-warning w-100 mb-2">Enviar</button>
        <button onclick="goTo('menu.html')" class="btn btn-secondary w-100">Volver</button>
    </div>
</div>
<script src="assets/js/wallet.js"></script>
<script src="assets/js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
